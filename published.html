<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Published and Prizes - Nicole Tecchio Illustrator</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div id="header-placeholder"></div>
  <script src="header/header.js"></script>

  <main>
    <section class="published">
        <h2>Published books</h2>
        <div class="published-box">
            <a href="https://www.quintoquartoedizioni.it/libro/b-il-buio-e-un-buco/" target="_blank" class="book-link">
            <div class="book-card">
                <img src="pics/b.jpg" alt="B, il buio e un buco" class="book-img">  
                <div class="book-overlay">
                    <p class="book-text">B, il buio e un buco, Quinto Quarto Edizioni, 2025</p>
                </div>
            </div></a>
            
            <a href="https://www.quintoquartoedizioni.it/libro/tutto-come-previsto/" target="_blank" class="book-link">
            <div class="book-card">
                <img src="pics/tcp.jpg" alt="Tutto come previsto" class="book-img">  
                <div class="book-overlay">
                    <p class="book-text">Tutto come previsto, Quinto Quarto Edizioni, 2024</p>
                </div>
            </div></a>
        </div>
    </section>

    <section class="published">
        <h2>Prizes</h2>
        <div class="published-box">
            <div class="book-card">
                <img src="pics/se-leggi-ti-liberi-2.png" alt="Se leggi ti liberi" class="book-img">  
                <div class="book-overlay">
                    <p class="book-text">Se leggi ti liberi, 2023</p>
                </div>
            </div>
        </div>
    </section>
  </main>

</body>

<div id="footer-placeholder"></div>
<script src="footer/footer.js"></script>

</html>
