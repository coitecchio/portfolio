<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicole Tecchio Illustrator</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="header-placeholder"></div>
  <script src="header/header.js"></script>

  <main>

    <section>
      <div class="portfolio-grid">

        <div class="item item-hover">
          <img src="pics/Tumulto3.png" alt="Tumulto Pride 2025">
          <div class="item-overlay">
            <p class="item-text">Logo for Tumulto Pride, Verona 2025</p> 
          </div>
        </div>

        <div class="item item-hover viola">
          <img src="pics/Con questo fiore.jpeg" alt="Mantovaner 25aprile25">
          <div class="item-overlay">
            <p class="item-text">Questo è il fiore - cover for The Mantovaner, Mantova 25 aprile 2025</p> 
          </div>
        </div>

        <div class="item item-hover arancione">
          <img src="pics/polpo.jpg" alt="Polpo che fa una casetta coi tentacoli">
          <div class="item-overlay">
            <p class="item-text">Selected illustration for Segni d'infanzia festival, Mantova 2024</p> 
          </div>
        </div>

        <div class="item item-hover verde">
          <img src="pics/se-leggi-ti-liberi-2.png" alt="Uccellino con casetta fatta da un libro">
          <div class="item-overlay">
            <p class="item-text">Official illustration for IL MAGGIO DEI LIBRI 2024</p> 
          </div>
        </div>

        <div class="item item-hover viola">
          <img src="pics/collage-pub.jpeg" alt="Collage pubblicato">
          <div class="item-overlay">
            <p class="item-text">MEMORANDUM - artwork for OLTRE magazine 2024</p>
          </div>
        </div>
        <div class="item"><img src="pics/cappuccettolegno.jpeg" alt="Tronco con cappuccetto"></div>

      </div>
    </section>


    

  </main>

  <script src="script.js"></script>

</body>

  <script>
    const slider = document.getElementById('slider');

    function scrollR() {
        // Scorre a destra di 300px
        slider.scrollBy({ left: 300, behavior: 'smooth' });
    }

    function scrollL() {
        // Scorre a sinistra di 300px
        slider.scrollBy({ left: -300, behavior: 'smooth' });
    }
</script>
<div id="footer-placeholder"></div>
<script src="footer/footer.js"></script>

</html>
